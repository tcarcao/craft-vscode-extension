name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  build-vsix:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-x64
            go_os: darwin
            go_arch: amd64
            vsce_target: darwin-x64
            bin_name: craft
          - platform: darwin-arm64
            go_os: darwin
            go_arch: arm64
            vsce_target: darwin-arm64
            bin_name: craft
          - platform: linux-x64
            go_os: linux
            go_arch: amd64
            vsce_target: linux-x64
            bin_name: craft
          - platform: linux-arm64
            go_os: linux
            go_arch: arm64
            vsce_target: linux-arm64
            bin_name: craft
          - platform: win32-x64
            go_os: windows
            go_arch: amd64
            vsce_target: win32-x64
            bin_name: craft.exe
          - platform: win32-arm64
            go_os: windows
            go_arch: arm64
            vsce_target: win32-arm64
            bin_name: craft.exe

    runs-on: ubuntu-latest
    name: VSIX (${{ matrix.platform }})
    steps:
      - uses: actions/checkout@v4

      # Checkout the craft Go repo alongside the extension repo.
      # In a separate-repos setup this uses the companion repo at the same
      # GitHub organisation; in a monorepo both are already present.
      - uses: actions/checkout@v4
        with:
          repository: tcarcao/craft
          path: craft-go-src

      # ── Build Go binary ──────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: craft-go-src/go.mod
          cache: true
          cache-dependency-path: craft-go-src/go.sum

      - name: Build craft binary (${{ matrix.platform }})
        working-directory: craft-go-src
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" \
            -o "${{ github.workspace }}/dist/bin/${{ matrix.platform }}/${{ matrix.bin_name }}" \
            ./cmd/craft

      # ── Bundle extension ─────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install extension dependencies
        run: npm ci

      - name: Bundle extension
        run: npm run bundle

      # ── Package VSIX ─────────────────────────────────────────────────────
      - name: Package VSIX for ${{ matrix.platform }}
        run: |
          npx @vscode/vsce package \
            --target ${{ matrix.vsce_target }} \
            --no-dependencies \
            --out craft-arch-diagrams-${{ matrix.vsce_target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.platform }}
          path: craft-arch-diagrams-${{ matrix.vsce_target }}.vsix
          retention-days: 30
